version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/nextjs-base"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "roCal93"
    assignees:
      - "roCal93"
    commit-message:
      prefix: "deps"
      include: "scope"
    ignore:
      # These are transitive dependency security pins managed via pnpm.overrides.
      # Dependabot cannot update transitive dependencies in pnpm and will error.
      - dependency-name: "flatted"
      - dependency-name: "serialize-javascript"
      - dependency-name: "undici"